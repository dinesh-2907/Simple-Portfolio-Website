<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
     <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">

</head>

<body>
    <div class="container">
    <div class="cont-one">
        <h1 class="cont-one__title">Dinesh</h1>
        <p class="cont-one__desc">Web Developer</p>
        <a href="index.html" class="cont-one__link">Home</a>
    </div>
    <div class="cont-two">
        <form>
            <table>
                <tr>
                    <td>Name:</td>
                    <td> <input type="text" placeholder="Enter your name" class="cont-two__input"> </td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td><input type="email" placeholder="Enter your email" class="cont-two__input"></td>
                </tr>

                <tr>
                    <td>Message:</td>
                    <td><input type="text" placeholder="Enter your message" class="cont-two__textarea"></textarea></td>
                    
                </tr>
                <tr>
                    <td>
                    </td>
                    <td><input type="submit" class="cont-two__submit"></td>
            </table>

        </form>


    </div>
    <div class="cont-three">
        <p class="cont-three__link">Social Media :
            <a href="https://www.facebook.com">Facebook</a>
            <a href="https://www.twitter.com">Twitter</a>
            <a href="https://www.linkedin.com">LinkedIn</a>
        </p>
        <p class="cont-three_icon">
            &copy; Dinesh
        </p>
    </div>

    </div>

</body>

</html>
